name: laptopharbor
description: LaptopHarbor — cross-platform laptop e-commerce app (Flutter + Riverpod).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.5.0+1
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/laptops/
